name: Monthly Dependency and Submodule Update

on:
  schedule:
    # Runs on the 1st of every month at 03:00 UTC
    - cron: "0 3 1 * *"
  workflow_dispatch: # allows manual trigger

permissions:
  contents: write
  actions: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      has_changes: "false"

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0 # Needed for pushing tags
          submodules: true

      - name: Fetch tags
        run: git fetch --tags

      - name: Configure git user
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      # Set up Java & Maven to execute tests
      - name: Cache local .m2
        uses: actions/cache@v5.0.5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Setup Maven Action
        uses: s4u/setup-maven-action@v1.20.0
        with:
          checkout-fetch-depth: 0
          java-distribution: "temurin"
          java-version: "26"
          maven-version: "3.9.16"

      - name: Update all dependency versions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./.github/scripts/update_dependency_version.sh

      - name: Run Java lints and tests with Maven
        run: mvn clean install -Dall

      - name: Check for changes
        id: detect_changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            echo "has_changes=true" >> $GITHUB_ENV
          fi

      - name: Commit changes
        id: change_commit
        if: env.has_changes == 'true'
        run: git commit -m '[CI] Updating versions'

      - name: Push changes
        if: env.has_changes == 'true'
        uses: ad-m/github-push-action@v1.3.0
        with:
          branch: master
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger downstream workflow
        if: env.has_changes == 'true'
        uses: peter-evans/repository-dispatch@v4.0.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: zodac/parent-pom
          event-type: publish-event
